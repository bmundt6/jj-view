name: CI

on:
    push:
        branches:
            - main
        tags:
            - 'v*'
    pull_request:
        branches:
            - main

jobs:
    prepare:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.21'

            - name: Install jj (Jujutsu)
              uses: taiki-e/install-action@v2
              with:
                  tool: jj-cli

            - name: Verify Environment
              run: |
                  go version
                  jj --version
                  which jj

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Check Types
              run: pnpm check-types

            - name: Build Extension
              run: node esbuild.js

            - name: Build Tests
              run: pnpm build:tests

            - name: Package Extension
              run: pnpm package --out jj-view.vsix

            - name: Verify VSIX Contents
              run: pnpm exec ts-node scripts/verify-vsix.ts jj-view.vsix

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-outputs
                  path: |
                      dist/
                      out/
                      jj-view.vsix
                  retention-days: 1

    unit-tests:
        needs: prepare
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.21'

            - name: Install jj (Jujutsu)
              uses: taiki-e/install-action@v2
              with:
                  tool: jj-cli

            - name: Verify Environment
              run: |
                  go version
                  jj --version
                  which jj

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Download Build Artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-outputs
                  path: .

            - name: Run Unit Tests
              run: pnpm test:unit

    integration-tests:
        needs: prepare
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.21'

            - name: Install jj (Jujutsu)
              uses: taiki-e/install-action@v2
              with:
                  tool: jj-cli

            - name: Verify Environment
              run: |
                  go version
                  jj --version
                  which jj

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Download Build Artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-outputs
                  path: .

            - name: Run Integration Tests (Linux)
              if: runner.os == 'Linux'
              run: xvfb-run -a pnpm exec vscode-test --config .vscode-test.mjs && xvfb-run -a pnpm exec vscode-test --config .vscode-test-activation.mjs

            - name: Run Integration Tests (macOS/Windows)
              if: runner.os != 'Linux'
              run: |
                  pnpm exec vscode-test --config .vscode-test.mjs
                  pnpm exec vscode-test --config .vscode-test-activation.mjs

    e2e-tests:
        needs: prepare
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.21'

            - name: Install jj (Jujutsu)
              uses: taiki-e/install-action@v2
              with:
                  tool: jj-cli

            - name: Verify Environment
              run: |
                  go version
                  jj --version
                  which jj

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Download Build Artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-outputs
                  path: .

            - name: Install Playwright Chromium
              run: pnpm playwright install --with-deps chromium

            - name: Run E2E Tests
              env:
                  VSIX_PATH: jj-view.vsix
              run: xvfb-run -a pnpm exec playwright test -c playwright.e2e.config.ts

    release:
        needs: [unit-tests, integration-tests, e2e-tests]
        runs-on: ubuntu-latest
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'pull_request'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Download Build Artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-outputs
                  path: .

            - name: Generate Release Info
              id: release_info
              run: |
                  VERSION=$(jq -r .version package.json)
                  TIMESTAMP=$(date +'%Y%m%d-%H%M')
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    VSIX_NAME="jj-view-${VERSION}.vsix"
                  else
                    VSIX_NAME="jj-view-${VERSION}-pre-${TIMESTAMP}.vsix"
                  fi
                  echo "vsix_name=${VSIX_NAME}" >> $GITHUB_OUTPUT

                  # Rename the generic vsix to the specific release name
                  mv jj-view.vsix "${VSIX_NAME}"

                  # Generate Changelog
                  echo "changes<<EOF" >> $GITHUB_OUTPUT
                  echo "### Changes in build ${TIMESTAMP}" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT

                  # Find the last tag matching v*
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")

                  if [ -n "$PREVIOUS_TAG" ]; then
                    echo "Showing changes since ${PREVIOUS_TAG}:" >> $GITHUB_OUTPUT
                    git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s" >> $GITHUB_OUTPUT
                  else
                    echo "No previous release found. Showing last 20 commits:" >> $GITHUB_OUTPUT
                    git log -n 20 --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s" >> $GITHUB_OUTPUT
                  fi

                  echo "" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Upload Persistent Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: jj-view-extension-packaged
                  path: ${{ steps.release_info.outputs.vsix_name }}

            - name: Update Prerelease
              if: github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: prerelease
                  prerelease: true
                  files: ${{ steps.release_info.outputs.vsix_name }}
                  body: ${{ steps.release_info.outputs.changes }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v1
              with:
                  files: ${{ steps.release_info.outputs.vsix_name }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
